<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>设置 - 小镇股票交易所</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.header{background:#161b22;padding:14px 16px;border-bottom:1px solid #30363d;display:flex;align-items:center}
.back-btn{background:none;border:1px solid #30363d;color:#8b949e;font-size:13px;padding:5px 12px;border-radius:6px;cursor:pointer;margin-right:12px}
.back-btn:hover{border-color:#58a6ff;color:#e6edf3}
.header h2{font-size:16px;color:#e6edf3;font-weight:600}
.body{padding:16px;max-width:420px;margin:0 auto}
.setting{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:12px}
.setting .label{color:#e6edf3;font-size:14px;font-weight:600;margin-bottom:6px}
.setting .desc{color:#8b949e;font-size:12px;margin-bottom:10px}
.setting select,.setting input[type=number]{background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:6px 10px;border-radius:6px;font-size:13px;width:100%}
.toggle-row{display:flex;justify-content:space-between;align-items:center}
.toggle{width:44px;height:24px;background:#21262d;border-radius:12px;position:relative;cursor:pointer;border:1px solid #30363d;transition:.2s}
.toggle.on{background:#238636;border-color:#2ea043}
.toggle .dot{width:18px;height:18px;background:#8b949e;border-radius:50%;position:absolute;top:2px;left:2px;transition:.2s}
.toggle.on .dot{background:#fff;left:22px}
.btn-danger{padding:10px 0;width:100%;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #f85149;background:#3a1a1a;color:#f85149;margin-top:20px;transition:.15s}
.btn-danger:hover{background:#f85149;color:#fff}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="location.href='start.html'">← 返回</button>
  <h2>⚙️ 设置</h2>
</div>

<div class="body">
  <div class="setting">
    <div class="label">🎵 音效</div>
    <div class="desc">开启后交易和事件会有音效提示</div>
    <div class="toggle-row">
      <span id="soundLabel">已关闭</span>
      <div class="toggle" id="soundToggle" onclick="toggleSound()"><div class="dot"></div></div>
    </div>
  </div>

  <div class="setting">
    <div class="label">⚡ 默认速度</div>
    <div class="desc">进入游戏后的默认时间推进速度</div>
    <select id="defSpeed" onchange="saveSetting('defSpeed',this.value)">
      <option value="day">日</option>
      <option value="week" selected>周</option>
      <option value="month">月</option>
      <option value="year">年</option>
    </select>
  </div>

  <div class="setting">
    <div class="label">💰 起始资金</div>
    <div class="desc">新游戏的起始资金（仅新游戏生效）</div>
    <input type="number" id="startMoney" min="10000" max="1000000" step="10000" value="100000" onchange="saveSetting('startMoney',this.value)">
  </div>

  <button class="btn-danger" onclick="clearAllSaves()">🗑️ 清空所有存档</button>
</div>

<script>
function $(id) { return document.getElementById(id); }

var cfg = {};
try { cfg = JSON.parse(localStorage.getItem('townStockSettings')) || {}; } catch(e) {}

/* 初始化 */
if (cfg.sound) { $('soundToggle').className = 'toggle on'; $('soundLabel').textContent = '已开启'; }
if (cfg.defSpeed) $('defSpeed').value = cfg.defSpeed;
if (cfg.startMoney) $('startMoney').value = cfg.startMoney;

function toggleSound() {
  cfg.sound = !cfg.sound;
  saveCfg();
  var t = $('soundToggle');
  t.className = cfg.sound ? 'toggle on' : 'toggle';
  $('soundLabel').textContent = cfg.sound ? '已开启' : '已关闭';
}
function saveSetting(key, val) {
  cfg[key] = val;
  saveCfg();
}
function saveCfg() {
  localStorage.setItem('townStockSettings', JSON.stringify(cfg));
}
function clearAllSaves() {
  if (!confirm('确定清空所有3个存档槽位？此操作不可恢复！')) return;
  for (var i = 1; i <= 3; i++) localStorage.removeItem('townStockSave_' + i);
  alert('所有存档已清空！');
}
</script>
</body>
</html>
