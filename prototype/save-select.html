<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>存档选择 - 小镇股票交易所</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.header{background:#161b22;padding:14px 16px;border-bottom:1px solid #30363d;display:flex;align-items:center}
.back-btn{background:none;border:1px solid #30363d;color:#8b949e;font-size:13px;padding:5px 12px;border-radius:6px;cursor:pointer;margin-right:12px}
.back-btn:hover{border-color:#58a6ff;color:#e6edf3}
.header h2{font-size:16px;color:#e6edf3;font-weight:600}
.slots{padding:16px;max-width:420px;margin:0 auto}
.slot{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer;transition:.15s}
.slot:hover{border-color:#58a6ff}
.slot.used{border-color:#238636}
.slot.empty{border-style:dashed;opacity:0.7}
.slot .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.slot .slot-label{font-size:13px;color:#8b949e}
.slot .slot-day{font-size:13px;color:#58a6ff;font-weight:600}
.slot .info{font-size:12px;color:#8b949e;margin-bottom:4px}
.slot .info b{color:#e6edf3}
.slot .saved-time{font-size:11px;color:#484f58;margin-top:6px}
.slot .actions{display:flex;gap:8px;margin-top:10px}
.slot .act-btn{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #30363d;background:#21262d;color:#e6edf3;transition:.15s}
.slot .act-btn:hover{border-color:#58a6ff}
.slot .act-btn.danger{border-color:#f85149;color:#f85149}
.slot .act-btn.danger:hover{background:#3a1a1a}
.empty-text{color:#484f58;font-size:13px;text-align:center;padding:20px 0}
.footer{text-align:center;padding:20px;color:#484f58;font-size:11px}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="goBack()">← 返回</button>
  <h2 id="pageTitle">📦 存档选择</h2>
</div>

<div class="slots" id="slotsArea"></div>

<div class="footer">点击存档可加载 · 长按可删除</div>

<script>
function $(id) { return document.getElementById(id); }

var action = new URLSearchParams(location.search).get('action');

/* 页面标题 */
if (action === 'load') {
  $('pageTitle').textContent = '📂 选择存档加载';
}

function goBack() {
  location.href = 'start.html';
}

/* 渲染槽位 */
function render() {
  var html = '';
  for (var i = 1; i <= 3; i++) {
    var raw = localStorage.getItem('townStockSave_' + i);
    if (raw) {
      try {
        var d = JSON.parse(raw);
        var ta = Math.floor(d.G.money);
        for (var j = 0; j < d.S.length; j++) ta += Math.floor(d.S[j].price * d.S[j].shares);
        var dt = new Date(d.savedAt);
        var timeStr = dt.getFullYear() + '-' + p2(dt.getMonth()+1) + '-' + p2(dt.getDate()) + ' ' + p2(dt.getHours()) + ':' + p2(dt.getMinutes());
        html += '<div class="slot used" onclick="onSlotClick(' + i + ')">' +
          '<div class="top"><span class="slot-label">存档槽位 ' + i + '</span><span class="slot-day">D' + d.G.day + '</span></div>' +
          '<div class="info">💰 总资产: <b>$' + ta + '</b></div>' +
          '<div class="info">📋 日志: <b>' + d.G.logs.length + '条</b></div>' +
          '<div class="saved-time">上次保存: ' + timeStr + '</div>' +
          '<div class="actions">' +
            '<button class="act-btn" onclick="event.stopPropagation();loadSlot(' + i + ')">加载</button>' +
            '<button class="act-btn danger" onclick="event.stopPropagation();deleteSlot(' + i + ')">删除</button>' +
          '</div>' +
        '</div>';
      } catch(e) {
        html += '<div class="slot empty" onclick="onSlotClick(' + i + ')"><div class="empty-text">槽位 ' + i + ' - 存档损坏，点击覆盖</div></div>';
      }
    } else {
      html += '<div class="slot empty" onclick="onSlotClick(' + i + ')"><div class="empty-text">槽位 ' + i + ' - 空存档，点击开始新游戏</div></div>';
    }
  }
  $('slotsArea').innerHTML = html;
}

function onSlotClick(slot) {
  if (action === 'load') {
    loadSlot(slot);
  } else {
    /* 检查槽位是否已有数据 */
    var raw = localStorage.getItem('townStockSave_' + slot);
    if (raw) {
      if (!confirm('槽位 ' + slot + ' 已有存档，覆盖开始新游戏？')) return;
    }
    location.href = 'index.html?slot=' + slot;
  }
}

function loadSlot(slot) {
  var raw = localStorage.getItem('townStockSave_' + slot);
  if (!raw) {
    alert('该槽位没有存档！');
    return;
  }
  location.href = 'index.html?slot=' + slot;
}

function deleteSlot(slot) {
  if (!confirm('确定删除槽位 ' + slot + ' 的存档？')) return;
  localStorage.removeItem('townStockSave_' + slot);
  render();
}

function p2(n) { return n < 10 ? '0' + n : '' + n; }

render();
</script>
</body>
</html>
