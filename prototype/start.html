<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>小镇股票交易所</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:flex;align-items:center;justify-content:center}
.start-box{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:48px 40px;max-width:360px;width:90%;text-align:center}
.start-box h1{font-size:26px;color:#e6edf3;margin-bottom:6px}
.start-box .sub{color:#8b949e;font-size:13px;margin-bottom:32px}
.start-btn{display:block;width:100%;padding:14px 0;margin-bottom:12px;border:1px solid #30363d;border-radius:10px;background:#21262d;color:#e6edf3;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
.start-btn:hover{border-color:#58a6ff;background:#1f3a5f}
.start-btn.primary{background:#238636;border-color:#2ea043;color:#fff}
.start-btn.primary:hover{background:#2ea043}
.start-btn.disabled{opacity:0.4;cursor:not-allowed}
.start-btn.disabled:hover{border-color:#30363d;background:#21262d}
.slot-preview{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:10px;margin-bottom:10px;text-align:left}
.slot-preview .slot-title{font-size:12px;color:#8b949e;margin-bottom:4px}
.slot-preview .slot-info{font-size:13px;color:#e6edf3}
.footer{margin-top:28px;color:#484f58;font-size:11px}
</style>
</head>
<body>
<div class="start-box">
  <h1>🏘️ 小镇股票交易所</h1>
  <div class="sub">模拟经营 · 介入炒股</div>

  <button class="start-btn primary" onclick="goStart()">▶ 开始游戏</button>

  <div id="slotPreview"></div>

  <button class="start-btn" onclick="goSaves()">💾 存档选择</button>
  <button class="start-btn" onclick="goSettings()">⚙️ 设置</button>
  <button class="start-btn" onclick="goRules()">📖 游戏规则</button>

  <div class="footer">v0.3 · 原型</div>
</div>

<script>
function $(id) { return document.getElementById(id); }

function goStart() {
  try {
    var hasSave = false;
    for (var i = 1; i <= 3; i++) {
      if (localStorage.getItem('townStockSave_' + i)) { hasSave = true; break; }
    }
    if (hasSave) {
      window.location.assign('save-select.html?action=load');
    } else {
      window.location.assign('index.html?slot=1');
    }
  } catch(e) {
    window.location.assign('index.html?slot=1');
  }
}
function goSaves() {
  location.href = 'save-select.html';
}
function goSettings() {
  location.href = 'settings.html';
}
function goRules() {
  location.href = 'rules.html';
}

function getSaveSlots() {
  var slots = [];
  for (var i = 1; i <= 3; i++) {
    var raw = localStorage.getItem('townStockSave_' + i);
    if (raw) {
      try {
        var d = JSON.parse(raw);
        var ta = Math.floor(d.G.money);
        for (var j = 0; j < d.S.length; j++) ta += Math.floor(d.S[j].price * d.S[j].shares);
        slots.push({slot:i, used:true, day:d.G.day, assets:ta, savedAt:d.savedAt});
      } catch(e) { slots.push({slot:i, used:false}); }
    } else {
      slots.push({slot:i, used:false});
    }
  }
  return slots;
}

/* 显示存档预览 */
function renderPreview() {
  var slots = getSaveSlots();
  var hasAny = slots.some(function(s){return s.used});
  if (!hasAny) return;
  var html = '';
  for (var i = 0; i < slots.length; i++) {
    var s = slots[i];
    if (s.used) {
      var d = new Date(s.savedAt);
      var timeStr = d.getFullYear() + '-' + p2(d.getMonth()+1) + '-' + p2(d.getDate());
      html += '<div class="slot-preview">' +
        '<div class="slot-title">存档 ' + s.slot + ' · D' + s.day + '</div>' +
        '<div class="slot-info">💰 $' + s.assets + ' · ' + timeStr + '</div>' +
      '</div>';
    }
  }
  $('slotPreview').innerHTML = html;
}
function p2(n) { return n < 10 ? '0' + n : '' + n; }

renderPreview();
</script>
</body>
</html>
